<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>User Login</h1>
    <form method="POST">
        {% csrf_token %}
         <input type="text"
               name="username"
               placeholder="Enter Username">

        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter Password">

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>
</html>
