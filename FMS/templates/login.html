{% extends 'base.html' %}

{% block content %}

<div style="
display:flex;
justify-content:center;
align-items:center;
height:70vh;
">

    <div class="glass-box" style="width:400px;">

        <h1 style="text-align:center; margin-bottom:30px;">
            Login
        </h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required
                   style="
                   width:100%;
                   padding:12px;
                   margin-bottom:20px;
                   border:none;
                   border-radius:10px;
                   ">

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required
                   style="
                   width:100%;
                   padding:12px;
                   margin-bottom:20px;
                   border:none;
                   border-radius:10px;
                   ">

            <button type="submit"
                    style="
                    width:100%;
                    padding:12px;
                    border:none;
                    border-radius:10px;
                    background:black;
                    color:white;
                    font-size:18px;
                    ">

                Login

            </button>

        </form>

    </div>

</div>

{% endblock %}
