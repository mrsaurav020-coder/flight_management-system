{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flight Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            color:white;
            overflow-x:hidden;
        }

        /* BACKGROUND VIDEO */

        .background-video{
            position:fixed;
            right:0;
            bottom:0;
            min-width:100%;
            min-height:100%;
            z-index:-1;
            overflow:hidden;
        }

        .background-video video{
            min-width:100%;
            min-height:100%;
            object-fit:cover;
            filter:brightness(40%);
        }

        /* NAVBAR */

        nav{
            padding:20px;
            text-align:center;
            background:rgba(0,0,0,0.4);
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-size:20px;
            font-weight:bold;
        }

        nav a:hover{
            color:orange;
        }

        /* PAGE CONTENT */

        .content{
            padding:40px;
        }

        /* GLASS EFFECT */

        .glass-box{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:30px;
            border-radius:20px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.5);
        }

    </style>

</head>

<body>

    <!-- BACKGROUND VIDEO -->

    <div class="background-video">

        <video autoplay muted loop playsinline>

            <source src="{% static 'video/background.mp4' %}"
                    type="video/mp4">

        </video>

    </div>

    <!-- NAVBAR -->

    <nav>

        <a href="/">Home</a>

        <a href="/history/">Booking History</a>

        {% if user.is_authenticated %}

            <a href="/logout/">Logout</a>

        {% else %}

            <a href="/login/">Login</a>

        {% endif %}

    </nav>

    <!-- PAGE CONTENT -->

    <div class="content">
        
    {% if messages %}

        {% for message in messages %}

            <div style="
            background:red;
            color:white;
            padding:15px;
            margin-bottom:20px;
            border-radius:10px;
            text-align:center;
            font-weight:bold;
            ">

            {{ message }}

            </div>

        {% endfor %}

    {% endif %}

        {% block content %}

        {% endblock %}

    </div>

</body>

</html>
